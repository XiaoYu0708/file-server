<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Server</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .pairing-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .pairing-card {
    background: linear-gradient(135deg, #1e293b, #334155);
    border-radius: 16px; padding: 40px 32px; text-align: center;
    width: 100%; max-width: 400px; border: 1px solid #475569;
  }
  .pairing-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #94a3b8; }
  .my-code-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .my-code {
    font-size: 64px; font-weight: 800; letter-spacing: 16px;
    font-family: 'Courier New', monospace; color: #38bdf8;
    text-shadow: 0 0 40px rgba(56,189,248,0.3);
    user-select: all; margin-bottom: 24px;
  }
  .divider { border: none; border-top: 1px solid #334155; margin: 24px 0; }

  .pair-input-group { display: flex; gap: 8px; }
  .pair-input {
    flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px;
    padding: 12px 16px; color: #e2e8f0; font-size: 20px; text-align: center;
    letter-spacing: 4px; font-family: 'Courier New', monospace; outline: none;
    text-transform: uppercase;
  }
  .pair-input:focus { border-color: #38bdf8; }
  .pair-input::placeholder { font-size: 14px; color: #475569; letter-spacing: 1px; }
  .pair-btn {
    background: #38bdf8; border: none; border-radius: 8px; padding: 12px 20px;
    color: #0f172a; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  .pair-btn:hover { background: #7dd3fc; }
  .pair-error { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
  .pair-success { color: #22c55e; font-size: 13px; margin-top: 10px; display: none; }

  .main-ui { display: none; }

  .header-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding: 12px 16px; background: #1e293b;
    border-radius: 12px; border: 1px solid #334155;
  }
  .header-bar .paired-with { font-size: 12px; color: #94a3b8; }
  .header-bar .paired-with span { color: #38bdf8; }
  .header-bar .unpair-btn {
    background: none; border: 1px solid #475569; color: #94a3b8;
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .header-bar .unpair-btn:hover { border-color: #ef4444; color: #ef4444; }

  .panel {
    background: #1e293b; border-radius: 12px; padding: 20px;
    margin-bottom: 20px; border: 1px solid #334155;
  }
  .panel h2 { font-size: 16px; margin-bottom: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

  .upload-area {
    border: 2px dashed #475569; border-radius: 8px; padding: 24px;
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .upload-area:hover, .upload-area.dragover { border-color: #38bdf8; background: #0f172a; }
  .upload-area p { color: #94a3b8; font-size: 14px; }
  .upload-area .icon { font-size: 32px; margin-bottom: 8px; }

  .mode-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .mode-toggle button { flex: 1; }

  .file-item {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #334155; transition: background 0.15s;
  }
  .file-item:hover { background: #0f172a; }
  .file-item:last-child { border-bottom: none; }
  .file-icon { font-size: 20px; margin-right: 12px; color: #64748b; }
  .file-icon.is-dir { color: #fbbf24; }
  .file-name { flex: 1; font-size: 14px; word-break: break-all; }
  .file-size { color: #64748b; font-size: 12px; margin: 0 16px; white-space: nowrap; }
  .file-actions { display: flex; gap: 6px; }
  .file-actions button {
    background: none; border: 1px solid #475569; color: #94a3b8;
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .file-actions .btn-download:hover { border-color: #22c55e; color: #22c55e; }
  .file-actions .btn-delete:hover { border-color: #ef4444; color: #ef4444; }

  .empty-state { text-align: center; padding: 40px 20px; color: #475569; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .btn { background: #38bdf8; border: none; border-radius: 6px; padding: 8px 16px; color: #0f172a; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #7dd3fc; }
  .btn-secondary { background: #334155; color: #e2e8f0; }
  .btn-secondary:hover { background: #475569; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #e2e8f0; padding: 12px 24px; border-radius: 8px;
    border: 1px solid #334155; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .my-code { font-size: 48px; letter-spacing: 12px; }
    .file-item { flex-wrap: wrap; gap: 8px; }
    .file-size { margin: 0; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="pairing-screen" id="pairingScreen">
    <div class="pairing-card">
      <div class="pairing-title">📡 你的配對碼</div>
      <div class="my-code-label">將此碼告訴對方</div>
      <div class="my-code" id="myCode">----</div>

      <hr class="divider">

      <div class="pairing-title">🔗 輸入對方的配對碼</div>
      <div class="pair-input-group">
        <input type="text" class="pair-input" id="pairInput" maxlength="4" placeholder="例如 AB3K"
               oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()"
               onkeydown="if(event.key==='Enter')pairWith()">
        <button class="pair-btn" onclick="pairWith()">配對</button>
      </div>
      <div class="pair-error" id="pairError"></div>
      <div class="pair-success" id="pairSuccess">✅ 配對成功！正在進入...</div>
    </div>
  </div>

  <div class="main-ui" id="mainUI">

    <div class="header-bar">
      <div class="paired-with">已與 <span id="pairedCode">----</span> 配對</div>
      <button class="unpair-btn" onclick="unpair()">🔗 解除配對</button>
    </div>

    <div class="panel">
      <h2>📤 上傳</h2>
      <div class="mode-toggle">
        <button class="btn" id="modeFile" onclick="setMode('file')">📄 檔案</button>
        <button class="btn btn-secondary" id="modeFolder" onclick="setMode('folder')">📁 資料夾</button>
      </div>
      <div class="upload-area" id="uploadArea">
        <div class="icon">⬆</div>
        <p id="uploadHint">點此選取檔案上傳</p>
      </div>
      <input type="file" id="fileInput" multiple style="display:none">
    </div>

    <div class="panel">
      <h2>📋 檔案列表</h2>
      <div id="fileList"></div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY = 'fs_session';
const TOAST = document.getElementById('toast');
const PAIRING_SCREEN = document.getElementById('pairingScreen');
const MAIN_UI = document.getElementById('mainUI');
const MY_CODE = document.getElementById('myCode');
const PAIR_INPUT = document.getElementById('pairInput');
const PAIR_ERROR = document.getElementById('pairError');
const PAIR_SUCCESS = document.getElementById('pairSuccess');
const FILE_LIST = document.getElementById('fileList');
const FILE_INPUT = document.getElementById('fileInput');
const UPLOAD_AREA = document.getElementById('uploadArea');
const PAIRED_CODE = document.getElementById('pairedCode');

let sessionId = '';
let uploadMode = 'file';

function showToast(msg, isError) {
  TOAST.textContent = msg;
  TOAST.style.color = isError ? '#ef4444' : '#e2e8f0';
  TOAST.classList.add('show');
  setTimeout(() => TOAST.classList.remove('show'), 2500);
}

function getSessionId() {
  let sid = localStorage.getItem(LS_KEY);
  if (!sid) {
    sid = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem(LS_KEY, sid);
  }
  return sid;
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'X-Session-ID': sessionId, ...opts.headers },
    ...opts
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '請求失敗');
  return data;
}

function setMode(mode) {
  uploadMode = mode;
  document.getElementById('modeFile').className = mode === 'file' ? 'btn' : 'btn btn-secondary';
  document.getElementById('modeFolder').className = mode === 'folder' ? 'btn' : 'btn btn-secondary';
  const hint = document.getElementById('uploadHint');
  if (mode === 'folder') {
    FILE_INPUT.removeAttribute('multiple');
    FILE_INPUT.setAttribute('webkitdirectory', '');
    FILE_INPUT.setAttribute('directory', '');
    hint.textContent = '點此選取整個資料夾上傳';
  } else {
    FILE_INPUT.removeAttribute('webkitdirectory');
    FILE_INPUT.removeAttribute('directory');
    FILE_INPUT.setAttribute('multiple', '');
    hint.textContent = '點此選取檔案上傳';
  }
}

// ─── Init Session ─────────────────────────────────────────

async function init() {
  sessionId = getSessionId();
  try {
    const data = await api('/api/session');
    MY_CODE.textContent = data.code;
    if (data.paired) {
      enterMainUI(data.paired_info ? data.paired_info.code : '');
    }
  } catch (e) {
    showToast('無法連接伺服器', true);
  }
}

// ─── Pairing ──────────────────────────────────────────────

async function pairWith() {
  const code = PAIR_INPUT.value.trim().toUpperCase();
  if (code.length < 4) { showPairError('請輸入完整的 4 位配對碼'); return; }
  PAIR_ERROR.style.display = 'none';
  try {
    const data = await api('/api/session/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    PAIR_SUCCESS.style.display = 'block';
    setTimeout(() => enterMainUI(data.paired_code), 600);
  } catch (e) {
    showPairError(e.message);
  }
}

function showPairError(msg) {
  PAIR_ERROR.textContent = '❌ ' + msg;
  PAIR_ERROR.style.display = 'block';
}

async function unpair() {
  try {
    await api('/api/session/unpair', { method: 'POST' });
    MAIN_UI.style.display = 'none';
    PAIRING_SCREEN.style.display = 'flex';
    PAIR_SUCCESS.style.display = 'none';
    PAIR_ERROR.style.display = 'none';
    PAIR_INPUT.value = '';
    init();
  } catch (e) {
    showToast('解除配對失敗', true);
  }
}

function enterMainUI(pairedCode) {
  PAIRING_SCREEN.style.display = 'none';
  MAIN_UI.style.display = 'block';
  PAIRED_CODE.textContent = pairedCode || '??';
  refreshList();
}

// ─── Files ────────────────────────────────────────────────

function renderFiles(files) {
  if (!files || files.length === 0) {
    FILE_LIST.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>還沒有檔案</p></div>';
    return;
  }
  let html = '';
  for (const f of files) {
    const icon = f.is_dir ? '📁' : '📄';
    const size = f.size > 0 ? f.size.toLocaleString() + ' B' : '';
    html += '<div class="file-item">'
      + '<div class="file-icon' + (f.is_dir ? ' is-dir' : '') + '">' + icon + '</div>'
      + '<div class="file-name">' + escapeHtml(f.name) + '</div>'
      + '<div class="file-size">' + size + '</div>'
      + '<div class="file-actions">'
      + '<button class="btn-download" onclick="downloadFile(\'' + escapeJs(f.name) + '\')">'
      + (f.is_dir ? '📥 ZIP' : '下載') + '</button>'
      + '<button class="btn-delete" onclick="deleteFile(\'' + escapeJs(f.name) + '\')">刪除</button>'
      + '</div></div>';
  }
  FILE_LIST.innerHTML = html;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeJs(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function refreshList() {
  api('/api/files')
    .then(files => renderFiles(files))
    .catch(() => showToast('重新整理失敗', true));
}

UPLOAD_AREA.addEventListener('click', () => FILE_INPUT.click());
UPLOAD_AREA.addEventListener('dragover', e => { e.preventDefault(); UPLOAD_AREA.classList.add('dragover'); });
UPLOAD_AREA.addEventListener('dragleave', () => UPLOAD_AREA.classList.remove('dragover'));
UPLOAD_AREA.addEventListener('drop', e => {
  e.preventDefault(); UPLOAD_AREA.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) doUpload(e.dataTransfer.files);
});
FILE_INPUT.addEventListener('change', () => {
  if (FILE_INPUT.files.length > 0) { doUpload(FILE_INPUT.files); FILE_INPUT.value = ''; }
});

function doUpload(files) {
  const formData = new FormData();
  for (const f of files) {
    const path = f.webkitRelativePath || f.name;
    formData.append('file', f, path);
  }
  fetch('/api/upload', {
    method: 'POST', headers: { 'X-Session-ID': sessionId }, body: formData
  })
  .then(r => r.json())
  .then(data => { showToast(data.message || '上傳完成'); refreshList(); })
  .catch(() => showToast('上傳失敗', true));
}

function downloadFile(name) {
  fetch('/api/files/' + encodeURIComponent(name) + '?sid=' + sessionId, {
    headers: { 'X-Session-ID': sessionId }
  })
  .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  })
  .catch(() => showToast('下載失敗', true));
}

function deleteFile(name) {
  if (!confirm('確定刪除「' + name + '」？')) return;
  fetch('/api/files/' + encodeURIComponent(name), {
    method: 'DELETE', headers: { 'X-Session-ID': sessionId }
  })
  .then(r => r.json())
  .then(data => { showToast(data.message); refreshList(); })
  .catch(() => showToast('刪除失敗', true));
}

init();
</script>

</body>
</html>
